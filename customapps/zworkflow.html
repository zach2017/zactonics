<style>
  :root, [data-theme="light"] {

    --accent-red: #b91c1c; --accent-red-dim: rgba(185,28,28,0.06);
    --accent-purple: #6d28d9;
    --json-key: #1e3a8a; --json-string: #047857; --json-number: #92400e;
    --json-bool: #6d28d9; --json-null: #94a3b8; --json-bracket: #94a3b8;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --noise-opacity: 0;
  }
  [data-theme="dark"] {
    --bg-deep: #0a0e17; --bg-panel: #0f1520; --bg-card: #141c2b;
    --bg-hover: #1a2435; --border: #1e2a3d; --border-bright: #2a3a52;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --text-muted: #475569;
    --accent-green: #22d3a7; --accent-green-dim: rgba(34,211,167,0.12);
    --accent-blue: #60a5fa; --accent-blue-dim: rgba(96,165,250,0.1);
    --accent-amber: #fbbf24; --accent-amber-dim: rgba(251,191,36,0.12);
    --accent-red: #f87171; --accent-red-dim: rgba(248,113,113,0.1);
    --accent-purple: #a78bfa;
    --json-key: #7dd3fc; --json-string: #86efac; --json-number: #fbbf24;
    --json-bool: #c084fc; --json-null: #64748b; --json-bracket: #475569;
    --shadow-sm: none; --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --noise-opacity: 0.02;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-deep); color:var(--text-primary); font-family:'DM Sans',sans-serif; overflow:hidden; height:100vh; transition:background .4s,color .3s; }
  .mono { font-family:'JetBrains Mono',monospace; }
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .status-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; }
  .status-completed { background:var(--accent-green-dim); color:var(--accent-green); }
  .status-running { background:var(--accent-blue-dim); color:var(--accent-blue); }
  .status-failed { background:var(--accent-red-dim); color:var(--accent-red); }
  .status-pending { background:rgba(148,163,184,0.1); color:var(--text-muted); }

  .activity-node { position:relative; padding:14px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all .2s; box-shadow:var(--shadow-sm); }
  .activity-node:hover { background:var(--bg-hover); border-color:var(--border-bright); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .activity-node.selected { border-color:var(--accent-blue); background:var(--accent-blue-dim); }
  .activity-connector { width:2px; height:22px; background:var(--border); margin-left:28px; position:relative; }
  .activity-connector::after { content:''; position:absolute; bottom:-3px; left:-3px; width:8px; height:8px; border-radius:50%; background:var(--border-bright); }

  .tab-btn { padding:8px 16px; font-size:13px; font-weight:600; color:var(--text-muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:all .15s; }
  .tab-btn:hover { color:var(--text-primary); }
  .tab-btn.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }

  .json-viewer { font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.75; white-space:pre-wrap; word-break:break-all; }
  .json-key { color:var(--json-key); } .json-string { color:var(--json-string); }
  .json-number { color:var(--json-number); } .json-bool { color:var(--json-bool); }
  .json-null { color:var(--json-null); font-style:italic; } .json-bracket { color:var(--json-bracket); }

  .pulse { animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

  .workflow-row { display:grid; grid-template-columns:2fr 1.2fr .8fr 1fr 1fr .6fr; align-items:center; padding:13px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .workflow-row:hover { background:var(--bg-hover); }
  .workflow-row.selected { background:var(--accent-blue-dim); }

  .bg-noise { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:var(--noise-opacity); background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

  .fade-in { animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;} }
  .slide-in { animation:slideIn .25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:none;} }

  .theme-switch { position:relative; width:52px; height:28px; border-radius:99px; cursor:pointer; background:var(--border); border:1px solid var(--border-bright); transition:all .4s; display:flex; align-items:center; padding:0 3px; flex-shrink:0; }
  .theme-switch:hover { border-color:var(--accent-blue); }
  .theme-switch .knob { width:22px; height:22px; border-radius:50%; background:var(--bg-panel); box-shadow:0 1px 4px rgba(0,0,0,.12); display:flex; align-items:center; justify-content:center; transition:transform .4s cubic-bezier(.4,0,.2,1),background .3s; transform:translateX(0); }
  [data-theme="dark"] .theme-switch .knob { transform:translateX(23px); }
  .knob-icon { width:14px; height:14px; }

  /* ── Panel Expand Controls ── */
  .panel-toolbar {
    display:flex; align-items:center; gap:4px; flex-shrink:0;
  }
  .panel-btn {
    display:flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:6px;
    border:1px solid var(--border); background:var(--bg-card);
    color:var(--text-muted); cursor:pointer; transition:all .15s;
    flex-shrink:0;
  }
  .panel-btn:hover { border-color:var(--accent-blue); color:var(--accent-blue); background:var(--accent-blue-dim); }
  .panel-btn.active-expand { border-color:var(--accent-blue); color:var(--accent-blue); background:var(--accent-blue-dim); }
  .panel-btn svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* Panel transition */
  #workflow-list-panel, #timeline-col, #detail-col {
    transition: width .35s cubic-bezier(.4,0,.2,1), min-width .35s cubic-bezier(.4,0,.2,1), flex .35s cubic-bezier(.4,0,.2,1), opacity .25s;
    overflow: hidden;
  }
  .panel-collapsed { width:0!important; min-width:0!important; flex:0 0 0!important; padding:0!important; border:none!important; opacity:0; pointer-events:none; }

  .section-label {
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:1px;
  }
</style>

// ── Theme ──
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('icon-sun').style.display = next==='light'?'block':'none';
  document.getElementById('icon-moon').style.display = next==='dark'?'block':'none';
}

// ── Panel Expand System ──
const panels = {
  wf: () => document.getElementById('workflow-list-panel'),
  tl: () => document.getElementById('timeline-col'),
  dt: () => document.getElementById('detail-col'),
};

function expandPanel(panelKey, direction) {
  const wf = panels.wf(), tl = panels.tl(), dt = panels.dt();

  if (direction === 'reset') {
    // restore default 3-col
    wf.classList.remove('panel-collapsed');
    wf.style.width = '42%'; wf.style.flex = '0 0 42%';
    if (selectedWorkflow) {
      tl.classList.remove('panel-collapsed');
      tl.style.width = '310px'; tl.style.flex = '0 0 310px';
      dt.classList.remove('panel-collapsed');
      dt.style.width = ''; dt.style.flex = '1';
    }
    return;
  }

  if (direction === 'full') {
    // collapse others, expand this one full
    [wf, tl, dt].forEach(p => p.classList.add('panel-collapsed'));
    const target = panels[panelKey]();
    target.classList.remove('panel-collapsed');
    target.style.width = '100%'; target.style.flex = '1 1 100%';
    return;
  }

  if (direction === 'right') {
    if (panelKey === 'wf') {
      // workflow expands right → collapse detail, grow wf + tl
      dt.classList.add('panel-collapsed');
      wf.classList.remove('panel-collapsed');
      tl.classList.remove('panel-collapsed');
      wf.style.width = '55%'; wf.style.flex = '0 0 55%';
      tl.style.width = ''; tl.style.flex = '1';
    } else if (panelKey === 'tl') {
      // timeline expands right → collapse detail, grow timeline
      dt.classList.add('panel-collapsed');
      tl.classList.remove('panel-collapsed');
      tl.style.width = ''; tl.style.flex = '1';
    }
    return;
  }

  if (direction === 'left') {
    if (panelKey === 'tl') {
      // timeline expands left → collapse workflow list
      wf.classList.add('panel-collapsed');
      tl.classList.remove('panel-collapsed');
      tl.style.width = '380px'; tl.style.flex = '0 0 380px';
      dt.classList.remove('panel-collapsed');
      dt.style.flex = '1';
    } else if (panelKey === 'dt') {
      // detail expands left → collapse timeline
      tl.classList.add('panel-collapsed');
      dt.classList.remove('panel-collapsed');
      dt.style.flex = '1';
      wf.classList.remove('panel-collapsed');
      wf.style.width = '38%'; wf.style.flex = '0 0 38%';
    }
    return;
  }
}

// ── State ──
let selectedWorkflow = null;
let selectedActivity = null;
let currentFilter = 'all';

// ── Render Workflows ──
function renderWorkflowList() {
  const c = document.getElementById('workflow-rows');
  const filtered = currentFilter==='all'?WORKFLOWS:WORKFLOWS.filter(w=>w.status===currentFilter);
  c.innerHTML = filtered.map(w=>`
    <div class="workflow-row ${selectedWorkflow?.id===w.id?'selected':''}" onclick="selectWorkflow('${w.id}')">
      <div>
        <span class="mono" style="font-size:13px;color:var(--accent-blue);font-weight:500;">${w.id}</span>
        <div class="mono" style="font-size:10px;color:var(--text-muted);margin-top:2px;">${w.runId}</div>
      </div>
      <div>
        <span style="font-size:13px;font-weight:600;">${w.type}</span>
        <div class="mono" style="font-size:10px;color:var(--text-muted);margin-top:2px;">${w.taskQueue}</div>
      </div>
      <div><span class="status-pill status-${w.status.toLowerCase()}">${si(w.status)} ${w.status}</span></div>
      <div class="mono" style="font-size:12px;color:var(--text-secondary);">${ft(w.startTime)}</div>
      <div class="mono" style="font-size:12px;color:var(--text-secondary);">${w.duration}</div>
      <div class="mono" style="font-size:12px;color:var(--text-secondary);text-align:center;">${w.activities.length}</div>
    </div>`).join('');
}

function si(s){return s==='Completed'?'✓':s==='Running'?'<span class="pulse">◉</span>':s==='Failed'?'✗':'○';}
function ft(iso){if(!iso)return'—';return new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}

function filterStatus(s) {
  currentFilter=s;
  document.querySelectorAll('.filter-btn').forEach(b=>{b.style.opacity=(s==='all'&&b.dataset.filter==='all')||b.dataset.filter===s?'1':'0.35';});
  renderWorkflowList();
}

function selectWorkflow(id) {
  selectedWorkflow = WORKFLOWS.find(w=>w.id===id);
  selectedActivity = selectedWorkflow.activities[0];

  const wf=panels.wf(), tl=panels.tl(), dt=panels.dt();
  wf.style.width='42%'; wf.style.flex='0 0 42%';
  tl.style.display='flex'; tl.style.width='310px'; tl.style.flex='0 0 310px';
  tl.classList.remove('panel-collapsed');
  dt.style.display='flex'; dt.style.flex='1';
  dt.classList.remove('panel-collapsed');
  document.getElementById('wf-toolbar').style.display='flex';

  renderWorkflowList(); renderDetailHeader(); renderTimeline(); renderActivityDetail();
}

function renderDetailHeader() {
  const w=selectedWorkflow;
  document.getElementById('detail-header').innerHTML=`<div class="fade-in">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
      <span class="mono" style="font-size:13px;font-weight:600;color:var(--accent-blue);">${w.id}</span>
      <span class="status-pill status-${w.status.toLowerCase()}" style="font-size:9px;">${si(w.status)} ${w.status}</span>
    </div>
    <div class="mono" style="font-size:10px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap;">
      <span>${w.type}</span><span>${w.duration}</span><span>${w.runId}</span>
    </div>
  </div>`;
}

function closeDetail() {
  panels.tl().style.display='none'; panels.dt().style.display='none';
  const wf=panels.wf(); wf.style.width='100%'; wf.style.flex='1';
  wf.classList.remove('panel-collapsed');
  document.getElementById('wf-toolbar').style.display='none';
  selectedWorkflow=null; selectedActivity=null; renderWorkflowList();
}

function renderTimeline() {
  const acts=selectedWorkflow.activities;
  document.getElementById('activity-timeline').innerHTML=`<div class="fade-in">
    ${acts.map((a,i)=>`
      <div class="activity-node ${selectedActivity?.id===a.id?'selected':''}" onclick="selectActivity(${a.id})">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
          <span class="status-pill status-${a.status.toLowerCase()}" style="font-size:9px;padding:2px 7px;">${si(a.status)}</span>
          <span class="mono" style="font-size:11.5px;font-weight:600;">${a.name}</span>
        </div>
        <div class="mono" style="font-size:10px;color:var(--text-muted);display:flex;gap:12px;">
          <span>${a.duration}</span>
          ${a.retries>0?`<span style="color:var(--accent-amber);">⟳ ${a.retries}</span>`:''}
        </div>
      </div>
      ${i<acts.length-1?'<div class="activity-connector"></div>':''}
    `).join('')}
    <div style="margin-top:16px;text-align:center;">
      <button onclick="closeDetail()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;padding:5px 14px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;" onmouseover="this.style.borderColor='var(--accent-red)';this.style.color='var(--accent-red)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">✕ Close workflow</button>
    </div>
  </div>`;
}

function selectActivity(id) {
  selectedActivity=selectedWorkflow.activities.find(a=>a.id===id);
  renderTimeline(); renderActivityDetail();
}

function renderActivityDetail() {
  const a=selectedActivity;
  if(!a){document.getElementById('activity-detail').innerHTML='';return;}
  document.getElementById('activity-detail').innerHTML=`<div class="slide-in">
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg-panel);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span class="status-pill status-${a.status.toLowerCase()}">${si(a.status)} ${a.status}</span>
        <span class="mono" style="font-size:14px;font-weight:600;">${a.name}</span>
      </div>
      <div class="mono" style="font-size:11px;color:var(--text-muted);display:flex;gap:14px;flex-wrap:wrap;">
        <span>duration: <span style="color:var(--text-secondary)">${a.duration}</span></span>
        <span>type: <span style="color:var(--text-secondary)">${a.type}</span></span>
        <span>retries: <span style="color:${a.retries>0?'var(--accent-amber)':'var(--text-secondary)'}">${a.retries}</span></span>
      </div>
    </div>
    <div style="display:flex;border-bottom:1px solid var(--border);padding:0 20px;background:var(--bg-panel);">
      <button class="tab-btn active" onclick="switchTab('Input',this)">Input</button>
      <button class="tab-btn" onclick="switchTab('Output',this)">Output</button>
    </div>
    <div id="tab-content" style="padding:20px;overflow-y:auto;max-height:calc(100vh - 290px);">
      ${rj(a.input)}
    </div>
  </div>`;
}

function switchTab(tab,el) {
  el.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const a=selectedActivity,d=tab==='Input'?a.input:a.output;
  document.getElementById('tab-content').innerHTML=d===null
    ?`<div style="color:var(--text-muted);font-style:italic;padding:20px 0;">${a.status==='Running'?'<span class="pulse">●</span> In progress…':a.status==='Pending'?'Not yet started':'No data'}</div>`
    :rj(d);
}

function rj(obj){if(obj==null)return'<span class="json-null">null</span>';return`<div class="json-viewer">${hl(JSON.stringify(obj,null,2))}</div>`;}

function hl(j){
  return j.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?/g,m=>{
      if(m.endsWith(':'))return`<span class="json-key">${m.slice(0,-1)}</span>:`;
      return`<span class="json-string">${m}</span>`;
    })
    .replace(/\b(true|false)\b/g,'<span class="json-bool">$1</span>')
    .replace(/\bnull\b/g,'<span class="json-null">null</span>')
    .replace(/\b(-?\d+\.?\d*([eE][+-]?\d+)?)\b/g,'<span class="json-number">$1</span>')
    .replace(/([[\]{}])/g,'<span class="json-bracket">$1</span>');
}

// Init
filterStatus('all'); renderWorkflowList();
</script>
