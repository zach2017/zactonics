const DataService = {
  /* Reads */
  async getKpis(){
    await sleep(API_LATENCY);
    const s=_seed.students;
    const completed=s.filter(x=>x.status==='Completed').length;
    const placed=s.filter(x=>x.placed).length;
    const wages=s.filter(x=>x.wage_post).map(x=>x.wage_post-x.wage_pre);
    const avgWageGain=wages.reduce((a,b)=>a+b,0)/(wages.length||1);
    const fundingTotal=_seed.funding.reduce((a,b)=>a+b.allocated,0);
    const fundingSpent=_seed.funding.reduce((a,b)=>a+b.spent,0);
    return {
      totalEnroll:s.filter(x=>['Enrolled','Completed'].includes(x.status)).length,
      placed, completed,
      placementRate: placed/(completed||1),
      avgWageGain:+avgWageGain.toFixed(2),
      fundingTotal, fundingSpent,
      utilization: fundingSpent/fundingTotal,
      activePrograms:_seed.programs.filter(p=>p.status==='Active').length,
      employerPartners:_seed.employers.length,
      openRoles:_seed.jobs.filter(j=>j.status==='Open').length,
      schoolsPartner:_seed.schools.length,
    };
  },
  async listPrograms(filter={}){await sleep(API_LATENCY);

    if(filter.q){const q=filter.q.toLowerCase();r=r.filter(p=>p.name.toLowerCase().includes(q)||p.track.toLowerCase().includes(q))}

    if(filter.q){const q=filter.q.toLowerCase();r=r.filter(s=>s.name.toLowerCase().includes(q)||s.email.toLowerCase().includes(q))}
    if(filter.status)r=r.filter(s=>s.status===filter.status);
    if(filter.programId)r=r.filter(s=>s.program===filter.programId);

  },

  async issueCredential(studentId,credName){await sleep(API_LATENCY);
    const s=_seed.students.find(x=>x.id===studentId);

  /* File uploads — mock layer. In production these POST to an Azure Function
     that streams to Azure Blob Storage and returns a SAS URL. We keep small
     in-memory references so the UI can display/download them. */
  async uploadResume(studentId, file){
    await sleep(API_LATENCY+80);
    const s=_seed.students.find(x=>x.id===studentId); if(!s) throw new Error('Student not found');
    if(file.size > 5*1024*1024) throw new Error('Resume must be under 5MB');
    const ok=['application/pdf','application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
    if(file.type && !ok.includes(file.type)) throw new Error('Resume must be PDF or DOCX');
    s.resume = {name:file.name, size:file.size, type:file.type||'application/pdf', uploaded:new Date().toISOString(), dataUrl:file._dataUrl||null};
    return s.resume;
  },
  async uploadProfilePhoto(studentId, file){
    await sleep(API_LATENCY+60);
    const s=_seed.students.find(x=>x.id===studentId); if(!s) throw new Error('Student not found');
    if(file.size > 2*1024*1024) throw new Error('Photo must be under 2MB');
    if(file.type && !file.type.startsWith('image/')) throw new Error('Photo must be an image');
    s.photo = {name:file.name, size:file.size, type:file.type||'image/jpeg', uploaded:new Date().toISOString(), dataUrl:file._dataUrl||null};
    return s.photo;
  },
  async uploadCertification(studentId, file, meta={}){
    await sleep(API_LATENCY+80);
    const s=_seed.students.find(x=>x.id===studentId); if(!s) throw new Error('Student not found');
    if(file.size > 5*1024*1024) throw new Error('Certification must be under 5MB');
    if(!s.certFiles) s.certFiles=[];
    const rec={
      id:'cf-'+String(Date.now()).slice(-6),
      name: meta.name || file.name.replace(/\.[^.]+$/,''),
      issuer: meta.issuer || 'Self-attested',
      issued: meta.issued || new Date().toISOString().slice(0,10),
      file:{name:file.name, size:file.size, type:file.type||'application/pdf', dataUrl:file._dataUrl||null}
    };
    s.certFiles.unshift(rec);
    if(!s.credentials) s.credentials=[];
    if(!s.credentials.includes(rec.name)) s.credentials.push(rec.name);
    return rec;
  },
  async deleteUpload(studentId, kind, id=null){
    await sleep(API_LATENCY);
    const s=_seed.students.find(x=>x.id===studentId); if(!s) return null;
    if(kind==='resume') s.resume=null;
    else if(kind==='photo') s.photo=null;
    else if(kind==='cert' && id && s.certFiles){
      const idx=s.certFiles.findIndex(c=>c.id===id);
      if(idx>=0){const removed=s.certFiles.splice(idx,1)[0]; s.credentials=(s.credentials||[]).filter(c=>c!==removed.name);}
    }
    return s;
  },
  async listUploads(studentId){
    await sleep(API_LATENCY);
    const s=_seed.students.find(x=>x.id===studentId); if(!s) return null;
    return {resume:s.resume||null, photo:s.photo||null, certFiles:s.certFiles||[]};
  },

  /* AI / Skills Match — mock semantic match using Jaccard similarity over skill sets.
     Replace with Azure OpenAI embeddings + Cosmos DB vector search. */
  async matchSkills(skillSet){
    await sleep(API_LATENCY+60);
    const set=new Set((skillSet||[]).map(x=>x.toLowerCase().trim()).filter(Boolean));
    const score=(arr)=>{
      const a=new Set((arr||[]).map(x=>x.toLowerCase()));
      const inter=[...set].filter(x=>a.has(x)).length;
      const union=new Set([...set,...a]).size||1;
      return inter/union;
    };
    const jobs=_seed.jobs.filter(j=>j.status==='Open').map(j=>({
      ...j,
      employerName:(_seed.employers.find(e=>e.id===j.employer)||{}).name,
      score:score(j.skills)
    })).sort((a,b)=>b.score-a.score).slice(0,6);
    const programs=_seed.programs.map(p=>({
      ...p,
      providerName:(_seed.schools.find(s=>s.id===p.provider)||{}).name,
      score:score(p.skills)
    })).sort((a,b)=>b.score-a.score).slice(0,5);
    return {jobs, programs};
  }
};

VIEWS.overview = async () => {
  const role = state.role;
  if(role==='manager') return overview_Manager();
  if(role==='employer') return overview_Employer();
  if(role==='student') return overview_Student();
  if(role==='school') return overview_School();
  return overview_Manager();
};

  const c3=document.getElementById('rep_wage'); if(c3){const t=chartTheme();const placed=_seed.students.filter(x=>x.wage_post);state.charts.rep_wage=new Chart(c3,{type:'bar',data:{labels:placed.map(p=>p.name.split(' ')[0]),datasets:[{label:'Pre',data:placed.map(p=>p.wage_pre),backgroundColor:'#d5d9de'},{label:'Post',data:placed.map(p=>p.wage_post),backgroundColor:t.brand}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:t.text}}},scales:{x:{grid:{color:t.grid},ticks:{color:t.text}},y:{grid:{color:t.grid},ticks:{color:t.text}}}}});}

  const c5=document.getElementById('rep_lm');if(c5){const lm=await DataService.getLaborMarket();const t=chartTheme();state.charts.rep_lm=new Chart(c5,{type:'bar',data:{labels:lm.occupations.map(o=>o.title),datasets:[{label:'Annual openings',data:lm.occupations.map(o=>o.openings_yr),backgroundColor:t.sky}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:t.text}}},scales:{x:{grid:{color:t.grid},ticks:{color:t.text}},y:{grid:{color:t.grid},ticks:{color:t.text}}}}});}

async function overview_Student(){

  const apps = await DataService.listApplications({studentId:me.id});
  const match = await DataService.matchSkills(me.skills);
  return `
  ${pageHeader(`Hi, ${me.name.split(' ')[0]}.`, `You're ${Math.round(me.progress*100)}% through ${program.name}. Keep going — your matched roles are below.`,
    btn('Find a Job','search',"navigate('jobs')"))}
  <section class=\"grid grid-cols-1 md:grid-cols-3 gap-4 mb-6\">
    ${kpi('Program Progress', Math.round(me.progress*100)+'%','+8%','book-open-text', program.name)}

    ${kpi('Credentials Earned', fmt(me.credentials.length),'+1','badge-check','digitally verified')}
  </section>
  <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    ${card(`<div class="p-5"><div class="font-semibold">Top matched jobs</div><p class="text-xs text-ink-500 mb-3">Based on your skills: ${me.skills.join(', ')}</p>
      <ul class="space-y-2">${match.jobs.slice(0,4).map(j=>`<li class="p-3 rounded-lg border border-ink-200 dark:border-ink-800 row-hover">
        <div class="flex items-center justify-between"><div class="font-semibold text-sm">${j.title}</div>${badge(Math.round(j.score*100)+'% match',j.score>0.5?'green':'amber')}</div>
        <div class="text-xs text-ink-500 mt-1">${j.employerName} · $${j.wage}/hr · ${j.type}</div>
        <div class="mt-2">${btn('Apply','send',`applyToJob('${me.id}','${j.id}')`,'soft')}</div></li>`).join('')}</ul></div>`)}

      <ul class="mt-3 space-y-2">${apps.map(a=>`<li class="flex items-center justify-between p-2 rounded-md row-hover"><div><div class="text-sm font-medium">${a.jobTitle}</div><div class="text-xs text-ink-500">${a.employerName} · applied ${a.applied}</div></div>${badge(a.stage,stageTone(a.stage))}</li>`).join('')||emptyState('No applications yet','Apply from any matched role.')}</ul></div>`)}

  const rows=[['Name','Email','Program','Status','Progress','County','Wage Pre','Wage Post']];
  _seed.students.forEach(s=>{const p=_seed.programs.find(x=>x.id===s.program);rows.push([s.name,s.email,p?p.name:'',s.status,(s.progress*100).toFixed(0)+'%',s.county,s.wage_pre,s.wage_post||''])});

/* ---------- Upload helpers (resume, photo, certifications) ----------
   In production these become POSTs to an Azure Function that streams
   to Blob Storage and returns a SAS URL. Here we read as a data URL
   so the file is downloadable from the UI immediately. */
function _readFileAsDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error('Could not read file'));
    r.readAsDataURL(file);
  });
}

  }[kind];
  if(!cfg) return;
  openModal(`
    <div class="flex items-start justify-between mb-4">

    <label id="up_dropzone" class="block p-8 rounded-xl border-2 border-dashed border-ink-300 dark:border-ink-700 hover:border-brand-500 transition cursor-pointer text-center">

      <div class="text-xs text-ink-500 mt-1">${cfg.hint}</div>
      <div id="up_filename" class="mt-3 text-sm text-brand-700 dark:text-brand-300 font-medium"></div>
      <div id="up_preview" class="mt-3"></div>
    </label>
    ${cfg.extra}
    <div id="up_error" class="hidden mt-3 p-3 rounded-lg bg-rose-50 dark:bg-rose-900/30 text-rose-700 dark:text-rose-300 text-sm"></div>
    <div class="mt-5 flex items-center justify-end gap-2">
      ${btn('Cancel','x','closeModal()','ghost')}

        <i data-lucide="upload" class="w-4 h-4"></i><span>Upload</span>
      </button>
    </div>
  `);
  // wire up drag & drop
  const dz = document.getElementById('up_dropzone');
  if(dz){
    ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('border-brand-500','bg-brand-50','dark:bg-brand-900/20')}));
    ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('border-brand-500','bg-brand-50','dark:bg-brand-900/20')}));
    dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0]; if(f){const inp=document.getElementById('up_file'); const dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; onUploadFileSelected({target:inp});}});
  }

let _pendingUpload = null;
async function onUploadFileSelected(e){
  const f = e.target.files[0]; if(!f) return;
  const errEl = document.getElementById('up_error'); errEl.classList.add('hidden');
  document.getElementById('up_filename').textContent = `${f.name}  ·  ${(f.size/1024).toFixed(1)} KB`;
  document.getElementById('up_submit').disabled = false;
  // preview if image
  const prev = document.getElementById('up_preview');
  prev.innerHTML='';
  if(f.type && f.type.startsWith('image/')){
    const dataUrl = await _readFileAsDataUrl(f);
    prev.innerHTML = `<img src="${dataUrl}" class="mx-auto max-h-40 rounded-lg shadow-soft" alt="preview" />`;
    f._dataUrl = dataUrl;
  } else {
    // still capture data URL so download works
    try{ f._dataUrl = await _readFileAsDataUrl(f); }catch(err){}
  }
  _pendingUpload = f;
}
async function submitUpload(studentId, kind){
  const f = _pendingUpload; if(!f){toast('Choose a file first','error');return;}
  const errEl = document.getElementById('up_error');
  try{
    if(kind==='resume') await DataService.uploadResume(studentId, f);
    else if(kind==='photo') await DataService.uploadProfilePhoto(studentId, f);
    else if(kind==='cert'){
      const meta={ name:document.getElementById('up_cert_name').value.trim() || f.name.replace(/\.[^.]+$/,''),
                   issuer:document.getElementById('up_cert_issuer').value.trim() || 'Self-attested',
                   issued:document.getElementById('up_cert_date').value || new Date().toISOString().slice(0,10) };
      await DataService.uploadCertification(studentId, f, meta);
    }
    _pendingUpload=null;
    closeModal();
    toast(({resume:'Resume uploaded',photo:'Profile photo updated',cert:'Certification uploaded'})[kind],'success');
    navigate(state.view);
  }catch(err){
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

}

function _simulateAuditEntries(source){
  const today = new Date();
  const entries = [];
  const actions = [
    {a:'Drawdown approved',     who:'D. Chen (Fiscal)',     amt:'$184,200', tag:'Disbursement'},
    {a:'Subrecipient invoice',   who:'Lawson State CC',     amt:'$42,800',  tag:'Payment'},
    {a:'Quarterly ETA-9130 filed',who:'A. Robinson (Compliance)',amt:'—',  tag:'Filing'},
    {a:'Cost allocation revised', who:'M. Patel (Finance)',  amt:'—',       tag:'Adjustment'},
    {a:'Equipment purchase',     who:'Wallace CC',           amt:'$28,400', tag:'Procurement'},
    {a:'Indirect rate verified', who:'Federal Project Officer', amt:'10.2%',tag:'Audit'},
    {a:'Reallocation request',   who:'D. Chen (Fiscal)',     amt:'$95,000', tag:'Adjustment'},
    {a:'Site monitoring visit',  who:'Field Ops',            amt:'—',       tag:'Compliance'},
    {a:'Drawdown approved',      who:'D. Chen (Fiscal)',     amt:'$210,500',tag:'Disbursement'},
    {a:'Single audit acknowledged',who:'A-133 reviewer',     amt:'—',       tag:'Audit'},
    {a:'Subrecipient invoice',   who:'Bishop State CC',      amt:'$31,650', tag:'Payment'},
    {a:'Modification executed',  who:'State Workforce Board',amt:'—',       tag:'Modification'},
  ];
  for(let i=0;i<12;i++){
    const d = new Date(today.getTime()-i*86400000*Math.floor(2+Math.random()*5));
    entries.push({date:d.toISOString().slice(0,10), ...actions[i%actions.length]});
  }
  return entries;
}

function recalcScenario(){
  const b=parseFloat(document.getElementById('ss_budget').value)*1e6;
  const c=parseFloat(document.getElementById('ss_cost').value);
  const cp=parseFloat(document.getElementById('ss_comp').value)/100;
  const pl=parseFloat(document.getElementById('ss_plc').value)/100;
  const w=parseFloat(document.getElementById('ss_wage').value);
  const seats=Math.floor(b/c), completers=Math.floor(seats*cp), placements=Math.floor(completers*pl);
  const uplift = placements * w * 2080; // 40h * 52w
  const cpp = placements? b/placements : 0;
  const roi = b? (uplift*3)/b : 0;
  const months = roi? (12/(roi)) : 0;
  document.getElementById('ss_budget_v').textContent='$'+(b/1e6).toFixed(1)+'M';
  document.getElementById('ss_cost_v').textContent='$'+c.toLocaleString();
  document.getElementById('ss_comp_v').textContent=(cp*100).toFixed(0)+'%';
  document.getElementById('ss_plc_v').textContent=(pl*100).toFixed(0)+'%';
  document.getElementById('ss_wage_v').textContent='+$'+w.toFixed(1)+'/hr';
  document.getElementById('ss_seats').textContent=seats.toLocaleString();
  document.getElementById('ss_completers').textContent=completers.toLocaleString();
  document.getElementById('ss_placements').textContent=placements.toLocaleString();
  document.getElementById('ss_uplift').textContent='$'+(uplift/1e6).toFixed(1)+'M';
  document.getElementById('ss_cpp').textContent='$'+Math.round(cpp).toLocaleString();
  document.getElementById('ss_roi').textContent=roi.toFixed(1)+'×';
  document.getElementById('ss_roi_note').textContent = `Pays back in ~${months.toFixed(1)} months of placed earnings.`;
}

function renderSidebar(){
  const role=ROLES[state.role];
  $('#sideNav').innerHTML = role.nav.map(key=>{
    const m=NAV_META[key];
    const active = key===state.view;
    return `<button class="nav-item w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-ink-100 dark:hover:bg-ink-900 transition relative" aria-current="${active}" onclick="navigate('${key}')">
      <span class="nav-rail absolute left-0 top-1.5 bottom-1.5 w-0.5 rounded-full"></span>
      <i data-lucide="${m.icon}" class="w-4 h-4 text-ink-500"></i>
      <span>${m.label}</span>

  }).join('');

}

function renderRoleMenu(){
  $('#roleMenu').innerHTML = Object.entries(ROLES).map(([k,r])=>`
    <button onclick="setRole('${k}')" class="w-full text-left flex items-center gap-3 px-3 py-2.5 hover:bg-ink-50 dark:hover:bg-ink-800 ${state.role===k?'bg-brand-50 dark:bg-brand-900/30':''}">

      <span class="flex-1"><span class="block font-semibold text-sm">${r.label}</span><span class="block text-xs text-ink-500">${r.user.name}</span></span>
      ${state.role===k?'<i data-lucide="check" class="w-4 h-4 text-brand-600"></i>':''}
    </button>`).join('');
  lucide.createIcons();
}
function toggleRoleMenu(){const m=$('#roleMenu');m.classList.toggle('hidden');renderRoleMenu();}
function setRole(k){
  state.role=k; const r=ROLES[k];
  $('#roleLabel').textContent=r.label;
  $('#userName').textContent=r.user.name;
  $('#userEmail').textContent=r.user.email;
  $('#userAvatar').textContent=r.user.initials;
  $('#roleMenu').classList.add('hidden');
  // Reset to first nav item for that role
  navigate(r.nav[0]);
  toast('Role: '+r.label,'info');
}

function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  // Re-render charts with correct colors
  if(state.view==='overview' || state.view==='reports' || state.view==='labormarket' || state.view==='employer') navigate(state.view);
  try{localStorage.setItem('wf_theme',document.documentElement.classList.contains('dark')?'dark':'light')}catch(e){}
}

// Close role menu on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('#roleBtn') && !e.target.closest('#roleMenu')){$('#roleMenu').classList.add('hidden');}
});
// Sidebar toggle (mobile)
document.addEventListener('click',e=>{ if(e.target.closest('#sidebarToggle')){$('#sidebar').classList.toggle('hidden');} });

/* Global search → routes to filtered view */
document.addEventListener('input',e=>{
  if(e.target.id==='globalSearch'){
    const q=e.target.value.toLowerCase();
    if(!q) return;
    // simple jump: if matches a student name, go to students
    if(_seed.students.some(s=>s.name.toLowerCase().includes(q))){state.view='students'; navigate('students');}
    else if(_seed.programs.some(p=>p.name.toLowerCase().includes(q))){navigate('programs');}
    else if(_seed.employers.some(em=>em.name.toLowerCase().includes(q))){navigate('employers');}
  }
});

/* ===================================================================
   10) BUILT-IN TEST SUITE
   ================================================================ */
const testResults = [];
function _t(name, fn){ return Promise.resolve().then(fn).then(()=>{testResults.push({name,ok:true})}).catch(err=>{testResults.push({name,ok:false,err:err.message||String(err)})}); }
function _expect(cond,msg){ if(!cond) throw new Error(msg||'expected truthy'); }

async function runTests(){
  testResults.length = 0;
  await _t('DataService.getKpis returns numeric fields', async()=>{const k=await DataService.getKpis();_expect(typeof k.totalEnroll==='number');_expect(k.placementRate>0);_expect(k.fundingTotal>0);});
  await _t('listPrograms returns >= 10 programs', async()=>{const p=await DataService.listPrograms();_expect(p.length>=10);});
  await _t('listPrograms filter by population=Veterans', async()=>{const p=await DataService.listPrograms({population:'Veterans'});_expect(p.length>=1);_expect(p.every(x=>x.population==='Veterans'));});
  await _t('listStudents returns enriched programName', async()=>{const s=await DataService.listStudents();_expect(s[0].programName && s[0].programName.length>0);});
  await _t('listEmployers contains strategic partners', async()=>{const e=await DataService.listEmployers();_expect(e.some(x=>x.partnership==='Strategic'));});
  await _t('listJobs returns employerName', async()=>{const j=await DataService.listJobs();_expect(j[0].employerName);});
  await _t('listApplications enriches student, job, employer', async()=>{const a=await DataService.listApplications();_expect(a[0].studentName && a[0].jobTitle && a[0].employerName);});
  await _t('createProgram inserts a record', async()=>{const before=(await DataService.listPrograms()).length;await DataService.createProgram({name:'TEST PROG',track:'Test',duration_weeks:4,capacity:10,cost_per_seat:1000,funding_source:'WIOA Title I',provider:'sch-01'});const after=(await DataService.listPrograms()).length;_expect(after===before+1);});
  await _t('createJob inserts a record', async()=>{const before=(await DataService.listJobs()).length;await DataService.createJob({title:'TEST JOB',wage:20,type:'Full-time',employer:'e-501',skills:['X']});const after=(await DataService.listJobs()).length;_expect(after===before+1);});
  await _t('applyToJob increments applicants', async()=>{const j=(await DataService.listJobs())[0];const before=j.applicants;await DataService.applyToJob('s-1001',j.id);const after=(await DataService.listJobs({})).find(x=>x.id===j.id).applicants;_expect(after===before+1);});
  await _t('advanceApplication to Hired marks student placed', async()=>{const a=await DataService.applyToJob('s-1011','j-9006');await DataService.advanceApplication(a.id,'Hired');const s=await DataService.getStudent('s-1011');_expect(s.placed===true);});
  await _t('approveStudent moves Applied → Enrolled', async()=>{const s0=await DataService.getStudent('s-1007');if(s0.status==='Applied'){await DataService.approveStudent('s-1007');}const s=await DataService.getStudent('s-1007');_expect(s.status==='Enrolled');});
  await _t('issueCredential adds to student record', async()=>{await DataService.issueCredential('s-1001','TEST CRED');const s=await DataService.getStudent('s-1001');_expect(s.credentials.includes('TEST CRED'));});
  await _t('matchSkills returns ranked jobs (>=1)', async()=>{const r=await DataService.matchSkills(['Python','Cloud']);_expect(r.jobs.length>=1);_expect(r.jobs[0].score>=r.jobs[r.jobs.length-1].score);});
  await _t('matchSkills empty input returns zero scores', async()=>{const r=await DataService.matchSkills([]);_expect(r.jobs.every(j=>j.score===0));});
  await _t('getFunding totals are positive', async()=>{const f=await DataService.getFunding();_expect(f.reduce((a,b)=>a+b.allocated,0)>0);_expect(f.every(x=>x.spent<=x.allocated));});
  await _t('Labor market returns occupations & rural gaps', async()=>{const lm=await DataService.getLaborMarket();_expect(lm.occupations.length>=5);_expect(lm.rural_gaps.length>=2);});
  await _t('Monthly trends has 12 labels', async()=>{const m=await DataService.getMonthlyTrends();_expect(m.labels.length===12);_expect(m.enrollments.length===12);});
  await _t('AuthService signIn returns user', async()=>{const u=await AuthService.signIn();_expect(u && u.email);});
  await _t('Roles all have a non-empty nav array', async()=>{Object.values(ROLES).forEach(r=>{_expect(Array.isArray(r.nav)&&r.nav.length>=2)});});
  await _t('Every role nav key has metadata', async()=>{Object.values(ROLES).forEach(r=>r.nav.forEach(k=>_expect(NAV_META[k],'missing meta for '+k)));});
  await _t('Render every Manager view without errors', async()=>{
    for(const v of ROLES.manager.nav){const html=await VIEWS[v]();_expect(typeof html==='string' && html.length>50,'view '+v+' returned bad html');}
  });
  await _t('Render every Student/Employer/School/Reporting view', async()=>{
    for(const role of ['student','employer','school','reporting']){state.role=role;for(const v of ROLES[role].nav){const html=await VIEWS[v]();_expect(typeof html==='string' && html.length>50,role+'/'+v);}}
    state.role='manager';
  });
  await _t('All 15 manager modal functions are defined and callable', async()=>{
    const fns = ['openProgramFilterModal','openAddEmployerModal','openContactEmployerModal','openAuditLogModal','openGrantWizardModal','openScenarioSimulator','openAIWorkforceForecast','openStrategyDocModal','openPolicyDocModal','openROIModal','openCohortDrilldown','openEmployerScorecard','openForecastModal','openWIOASubmitModal','openExportModal','openCredentialVerifyModal'];
    for(const name of fns){_expect(typeof globalThis[name]==='function','missing '+name)}
  });
  await _t('openContactEmployerModal works for every employer', async()=>{
    for(const e of _seed.employers){openContactEmployerModal(e.id);}
  });
  await _t('openAuditLogModal works for every funding source', async()=>{
    for(const f of _seed.funding){openAuditLogModal(f.source);}
  });
  await _t('openPolicyDocModal works for every policy', async()=>{
    for(const p of _seed.policies){openPolicyDocModal(p.id);}
  });
  await _t('Scenario & ROI calculators open without errors', async()=>{
    openScenarioSimulator(); if(typeof recalcScenario==='function') recalcScenario();
    openROIModal();
    _expect(true);
  });

  const passed = testResults.filter(t=>t.ok).length;
  const failed = testResults.length - passed;
  $('#testFabLabel').textContent = `Tests: ${passed}/${testResults.length}`;
  $('#testFab').className = `fixed bottom-6 left-6 z-40 px-3 py-2 rounded-full ${failed?'bg-rose-600':'bg-brand-600'} text-white text-xs font-semibold shadow-pop flex items-center gap-2`;
  if(failed){ toast(`${failed} test(s) failed — click flask icon`, 'error'); }
  else { toast(`All ${passed} tests passed`,'success'); }
}
