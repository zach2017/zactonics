<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Forge — AI Workflow Designer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Outfit', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --transition-theme: background 0.35s, color 0.35s, border-color 0.35s, box-shadow 0.35s;
}
[data-theme="dark"] {
  --bg-deep:#0a0e17; --bg-surface:#111827; --bg-card:#1a2235; --bg-elevated:#222d42;
  --border:#2a3650; --text-primary:#e2e8f0; --text-secondary:#8899b4; --text-muted:#556580;
  --accent-blue:#3b82f6; --accent-cyan:#06b6d4; --accent-green:#10b981;
  --accent-amber:#f59e0b; --accent-rose:#f43f5e; --accent-violet:#8b5cf6; --accent-orange:#f97316;
  --glow-blue:rgba(59,130,246,0.15); --glow-cyan:rgba(6,182,212,0.15);
  --grid-dot:rgba(59,130,246,0.12);
  --node-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.04);
  --sim-particle:#06b6d4; --sim-glow:rgba(6,182,212,0.5);
  --overlay-bg:rgba(10,14,23,0.85); --scrollbar-thumb:#2a3650;
}
[data-theme="light"] {
  --bg-deep:#f0f2f5; --bg-surface:#ffffff; --bg-card:#ffffff; --bg-elevated:#f7f8fa;
  --border:#d4d9e1; --text-primary:#1a202c; --text-secondary:#4a5568; --text-muted:#94a3b8;
  --accent-blue:#2563eb; --accent-cyan:#0891b2; --accent-green:#059669;
  --accent-amber:#d97706; --accent-rose:#e11d48; --accent-violet:#7c3aed; --accent-orange:#ea580c;
  --glow-blue:rgba(37,99,235,0.1); --glow-cyan:rgba(8,145,178,0.1);
  --grid-dot:rgba(37,99,235,0.08);
  --node-shadow:0 2px 12px rgba(0,0,0,0.08),0 0 0 1px rgba(0,0,0,0.06);
  --sim-particle:#0891b2; --sim-glow:rgba(8,145,178,0.4);
  --overlay-bg:rgba(255,255,255,0.9); --scrollbar-thumb:#cbd5e1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);transition:var(--transition-theme)}

.app{display:flex;height:100vh;flex-direction:column}
.toolbar{height:48px;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;z-index:100;transition:var(--transition-theme)}
.toolbar-brand{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:12px;white-space:nowrap}
.toolbar-brand span{font-weight:400;opacity:0.6;-webkit-text-fill-color:var(--text-secondary)}
.toolbar-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
.toolbar-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:5px 10px;border-radius:6px;font-family:var(--font-mono);font-size:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.toolbar-btn:hover{background:var(--bg-elevated);color:var(--text-primary);border-color:var(--accent-blue)}
.toolbar-btn.active{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue)}
.toolbar-btn.sim-active{background:var(--accent-green);color:#fff;border-color:var(--accent-green);animation:simPulse 2s infinite}
@keyframes simPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.3)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.toolbar-spacer{flex:1}
.toolbar-status{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:6px;white-space:nowrap}
.toolbar-status .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden}

.palette{width:272px;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:var(--transition-theme)}
.palette-header{padding:12px 14px 8px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);border-bottom:1px solid var(--border)}
.palette-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.palette-search input{width:100%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:6px;font-family:var(--font-mono);font-size:11px;outline:none;transition:var(--transition-theme)}
.palette-search input::placeholder{color:var(--text-muted)}
.palette-search input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 2px var(--glow-blue)}
.palette-body{flex:1;overflow-y:auto;padding:6px}
.palette-body::-webkit-scrollbar{width:4px}
.palette-body::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
.palette-section{margin-bottom:4px}
.palette-section-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);padding:6px 8px 4px;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}
.palette-section-title .chevron{transition:transform 0.2s;font-size:8px}
.palette-section.collapsed .chevron{transform:rotate(-90deg)}
.palette-section.collapsed .palette-items{display:none}
.palette-item{display:flex;align-items:center;gap:8px;padding:7px 8px;margin:2px 0;border-radius:6px;cursor:grab;border:1px solid transparent;transition:all 0.15s;user-select:none}
.palette-item:hover{background:var(--bg-card);border-color:var(--border)}
.palette-item:active{cursor:grabbing}
.palette-item .icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.palette-item .info{min-width:0}
.palette-item .info .name{font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette-item .info .desc{font-size:10px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.canvas-container{flex:1;position:relative;overflow:hidden;background:var(--bg-deep);transition:var(--transition-theme)}
.canvas-grid{position:absolute;inset:0;cursor:default;background-image:radial-gradient(circle,var(--grid-dot) 1px,transparent 1px);background-size:24px 24px}
.canvas-grid.panning{cursor:move}
#canvas-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
#canvas-svg path.connection{pointer-events:stroke}
.canvas-nodes{position:absolute;inset:0;z-index:2}

.node{position:absolute;min-width:176px;max-width:250px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--node-shadow);cursor:move;user-select:none;z-index:10;transition:box-shadow 0.2s,border-color 0.2s;animation:nodeAppear 0.2s ease-out}
@keyframes nodeAppear{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.node:hover{border-color:rgba(59,130,246,0.3)}
.node.selected{border-color:var(--accent-blue);box-shadow:var(--node-shadow),0 0 0 2px var(--glow-blue);z-index:20}
.node.sim-active-node{border-color:var(--accent-cyan)!important;box-shadow:0 0 20px var(--sim-glow),0 0 40px rgba(6,182,212,0.15)!important;z-index:25}
.node.sim-active-node .node-header{background:linear-gradient(135deg,rgba(6,182,212,0.15),transparent)!important}
.node.sim-done .node-header{background:linear-gradient(135deg,rgba(16,185,129,0.12),transparent)!important}
.node.sim-done{border-color:var(--accent-green)!important;opacity:0.7}

.node-header{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid var(--border);border-radius:10px 10px 0 0;transition:background 0.3s}
.node-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.node-title{font-family:var(--font-display);font-size:11.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-delete{width:18px;height:18px;border-radius:4px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all 0.15s}
.node:hover .node-delete{opacity:1}
.node-delete:hover{background:var(--accent-rose);color:#fff}
.node-body{padding:8px 11px;font-size:10px;color:var(--text-secondary);line-height:1.55}
.node-body .node-label{font-family:var(--font-mono);font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:3px}
.node-ports{display:flex;justify-content:space-between;padding:0 11px 8px}
.port{width:11px;height:11px;border-radius:50%;border:2px solid var(--border);background:var(--bg-surface);cursor:crosshair;transition:all 0.15s;position:relative}
.port:hover{border-color:var(--accent-cyan);background:var(--accent-cyan);transform:scale(1.3)}
.port.input{margin-left:-17px}
.port.output{margin-right:-17px}
.port-label{font-family:var(--font-mono);font-size:7px;color:var(--text-muted);white-space:nowrap;position:absolute;top:-12px;left:50%;transform:translateX(-50%)}
.connecting-mode .port{animation:portPulse 1s infinite}
@keyframes portPulse{0%,100%{opacity:1}50%{opacity:0.4}}

.connection{stroke:var(--accent-cyan);stroke-width:2;fill:none;opacity:0.5;transition:opacity 0.2s,stroke 0.2s}
.connection:hover{opacity:1;stroke-width:3;cursor:pointer}
.connection-temp{stroke:var(--accent-cyan);stroke-width:2;stroke-dasharray:6;fill:none;opacity:0.5}
.connection-arrow{fill:var(--accent-cyan);opacity:0.6}
.connection.sim-active-conn{stroke:var(--accent-cyan);opacity:0.9;stroke-width:2.5;filter:drop-shadow(0 0 4px var(--sim-glow))}
.connection.sim-done-conn{stroke:var(--accent-green);opacity:0.4;stroke-width:2}

.sim-particle{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--sim-particle);box-shadow:0 0 10px var(--sim-glow),0 0 20px var(--sim-glow);pointer-events:none;z-index:30}
.sim-particle-trail{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--sim-particle);opacity:0.3;pointer-events:none;z-index:29}

.sim-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--bg-surface);border:1px solid var(--accent-cyan);border-radius:10px;padding:8px 18px;z-index:60;display:none;align-items:center;gap:12px;font-family:var(--font-mono);font-size:11px;box-shadow:0 4px 24px rgba(0,0,0,0.3);transition:var(--transition-theme)}
.sim-bar.show{display:flex}
.sim-bar .sim-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-cyan);animation:simDotPulse 1.2s infinite}
@keyframes simDotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.sim-step-label{color:var(--accent-cyan);font-weight:600}
.sim-node-label{color:var(--text-primary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sim-counter{color:var(--text-muted);font-size:9px}
.sim-speed{display:flex;align-items:center;gap:4px;margin-left:8px}
.sim-speed button{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.sim-speed button:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}
.sim-speed button.active-speed{background:var(--accent-cyan);color:#fff;border-color:var(--accent-cyan)}

.properties{width:290px;background:var(--bg-surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width 0.3s,var(--transition-theme)}
.properties.hidden{width:0;min-width:0;border:none}
.props-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.props-header .props-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.props-header .props-title{font-family:var(--font-display);font-size:13px;font-weight:600;flex:1}
.props-header .props-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:2px}
.props-body{flex:1;overflow-y:auto;padding:10px 14px}
.props-body::-webkit-scrollbar{width:4px}
.props-body::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
.prop-group{margin-bottom:14px}
.prop-group-title{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);margin-bottom:6px}
.prop-field{margin-bottom:8px}
.prop-label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:3px;font-weight:500}
.prop-input,.prop-textarea{width:100%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:6px 9px;border-radius:6px;font-family:var(--font-mono);font-size:11px;outline:none;transition:var(--transition-theme)}
.prop-input:focus,.prop-textarea:focus{border-color:var(--accent-blue);box-shadow:0 0 0 2px var(--glow-blue)}
.prop-textarea{min-height:52px;resize:vertical;font-family:var(--font-body)}
.prop-tag-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.prop-tag{display:inline-flex;align-items:center;background:var(--bg-elevated);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:var(--font-mono);font-size:9px;color:var(--text-secondary)}

.color-agents{background:rgba(59,130,246,0.1)} .color-collectors{background:rgba(6,182,212,0.1)}
.color-llm{background:rgba(139,92,246,0.1)} .color-storage{background:rgba(16,185,129,0.1)}
.color-actuators{background:rgba(249,115,22,0.1)} .color-utilities{background:rgba(245,158,11,0.1)}
.color-config{background:rgba(244,63,94,0.1)}

.zoom-controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:2px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:3px;z-index:50}
.zoom-btn{width:26px;height:26px;border:none;background:transparent;color:var(--text-secondary);border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:var(--bg-elevated);color:var(--text-primary)}
.zoom-label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:0 6px;min-width:36px;text-align:center}

.drop-indicator{position:fixed;pointer-events:none;z-index:9999;background:var(--bg-card);border:2px dashed var(--accent-blue);border-radius:10px;padding:8px 14px;font-family:var(--font-display);font-size:12px;color:var(--accent-blue);opacity:0.9;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none}
.context-menu{position:fixed;z-index:1000;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none}
.context-menu-item{padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:7px}
.context-menu-item:hover{background:var(--bg-elevated);color:var(--text-primary)}
.context-menu-item.danger:hover{background:rgba(244,63,94,0.15);color:var(--accent-rose)}
.context-menu-sep{height:1px;background:var(--border);margin:3px 0}
.empty-state{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:0;opacity:0.35}
.empty-state .es-icon{font-size:44px;margin-bottom:10px}
.empty-state h3{font-family:var(--font-display);font-size:17px;font-weight:500;color:var(--text-secondary);margin-bottom:5px}
.empty-state p{font-size:12px;color:var(--text-muted)}

.modal-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;width:640px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 16px 64px rgba(0,0,0,0.4)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-family:var(--font-display);font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:0}
.modal-body pre{margin:0;padding:14px 18px;font-family:var(--font-mono);font-size:10.5px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:6px 14px;border-radius:7px;font-family:var(--font-mono);font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-primary);transition:all 0.2s}
.modal-btn:hover{border-color:var(--accent-blue)}
.modal-btn.primary{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue)}
.modal-btn.primary:hover{opacity:0.9}

.theme-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;flex-shrink:0}
.theme-toggle:hover{border-color:var(--accent-amber);color:var(--accent-amber)}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-brand">⚡ Agent Forge <span>v2.0</span></div>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" onclick="clearCanvas()">🗑 Clear</button>
    <button class="toolbar-btn" onclick="autoLayout()">⊞ Layout</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" id="simBtn" onclick="toggleSimulation()">▶ Simulate</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" onclick="exportJSON()">↓ JSON</button>
    <button class="toolbar-btn" onclick="exportYML()">↓ YAML</button>
    <button class="toolbar-btn" onclick="exportReadme()">↓ README</button>
    <button class="toolbar-btn" onclick="importWorkflow()">↑ Import</button>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-status"><span class="dot"></span><span id="statusText">Ready — drag components to build</span></div>
    <div class="toolbar-divider"></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
  </div>
  <div class="main">
    <div class="palette">
      <div class="palette-header">Components</div>
      <div class="palette-search"><input type="text" id="paletteSearch" placeholder="Search components..." oninput="filterPalette(this.value)"></div>
      <div class="palette-body" id="paletteBody"></div>
    </div>
    <div class="canvas-container" id="canvasContainer">
      <div class="canvas-grid" id="canvasGrid">
        <svg id="canvas-svg"><defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" class="connection-arrow"/></marker></defs></svg>
        <div class="canvas-nodes" id="canvasNodes"></div>
        <div class="empty-state" id="emptyState"><div class="es-icon">🔧</div><h3>Design Your Agent Workflow</h3><p>Drag components from the palette onto the canvas</p></div>
      </div>
      <div class="sim-bar" id="simBar">
        <div class="sim-dot"></div>
        <span class="sim-step-label" id="simStepLabel">Step 1</span>
        <span class="sim-node-label" id="simNodeLabel">—</span>
        <span class="sim-counter" id="simCounter"></span>
        <div class="sim-speed">
          <button onclick="setSimSpeed(0.5)" id="spd05" title="Slow">½×</button>
          <button onclick="setSimSpeed(1)" id="spd1" class="active-speed" title="Normal">1×</button>
          <button onclick="setSimSpeed(2)" id="spd2" title="Fast">2×</button>
        </div>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()">+</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button class="zoom-btn" onclick="zoomOut()">−</button>
        <button class="zoom-btn" onclick="zoomReset()" title="Reset">⊡</button>
      </div>
    </div>
    <div class="properties hidden" id="propsPanel">
      <div class="props-header">
        <div class="props-icon" id="propsIcon"></div>
        <div class="props-title" id="propsTitle">Properties</div>
        <button class="props-close" onclick="closeProps()">×</button>
      </div>
      <div class="props-body" id="propsBody"></div>
    </div>
  </div>
</div>
<div class="drop-indicator" id="dropIndicator"></div>
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" onclick="duplicateNode()">⧉ Duplicate</div>

// ═══════════════════ STATE ═══════════════════
let nodes=[],connections=[],selectedNodeId=null,contextNodeId=null,nextNodeId=1;
let zoom=1,panX=0,panY=0,isPanning=false,panStart={x:0,y:0};
let connectingFrom=null,tempLine=null,draggingNodeId=null,dragOffset={x:0,y:0};
let simRunning=false,simTimer=null,simStep=0,simSpeed=1;
let currentTheme='dark';
let modalFileData={name:'',content:''};

// ═══════════════════ THEME ═══════════════════
function toggleTheme(){
  currentTheme=currentTheme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',currentTheme);
  document.getElementById('themeToggle').textContent=currentTheme==='dark'?'🌙':'☀️';
}

// ═══════════════════ PALETTE ═══════════════════
function renderPalette(f=''){
  const body=document.getElementById('paletteBody');body.innerHTML='';const lf=f.toLowerCase();
  for(const[k,s]of Object.entries(COMPONENTS)){
    const fi=s.items.filter(i=>!lf||i.name.toLowerCase().includes(lf)||i.desc.toLowerCase().includes(lf)||i.id.includes(lf));
    if(!fi.length)continue;
    const sec=document.createElement('div');sec.className='palette-section';
    sec.innerHTML=`<div class="palette-section-title" onclick="this.parentElement.classList.toggle('collapsed')"><span class="chevron">▾</span>${s.label} (${fi.length})</div><div class="palette-items"></div>`;
    const it=sec.querySelector('.palette-items');
    for(const item of fi){const el=document.createElement('div');el.className='palette-item';el.draggable=true;el.dataset.componentId=item.id;
    el.innerHTML=`<div class="icon ${item.color}">${item.icon}</div><div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div></div>`;
    el.addEventListener('dragstart',onDragStart);it.appendChild(el);}body.appendChild(sec);}
}
function filterPalette(v){renderPalette(v)}
function getComponentDef(c){for(const s of Object.values(COMPONENTS)){const f=s.items.find(i=>i.id===c);if(f)return f;}return null}
function getComponentCategory(c){for(const[k,s]of Object.entries(COMPONENTS))if(s.items.find(i=>i.id===c))return k;return'unknown'}

// ═══════════════════ DRAG & DROP ═══════════════════
let dragData=null;const dI=document.getElementById('dropIndicator');
function onDragStart(e){const c=e.currentTarget.dataset.componentId;dragData=c;e.dataTransfer.setData('text/plain',c);e.dataTransfer.effectAllowed='copy';dI.style.display='block';const d=getComponentDef(c);dI.textContent=`${d.icon} ${d.name}`}
document.addEventListener('dragover',e=>{e.preventDefault();dI.style.left=(e.clientX+14)+'px';dI.style.top=(e.clientY+14)+'px'});
document.addEventListener('dragend',()=>{dI.style.display='none';dragData=null});
const cG=document.getElementById('canvasGrid');
cG.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy'});
cG.addEventListener('drop',e=>{e.preventDefault();dI.style.display='none';const c=e.dataTransfer.getData('text/plain')||dragData;if(!c)return;const d=getComponentDef(c);if(!d)return;const r=cG.getBoundingClientRect();addNode(d,(e.clientX-r.left-panX)/zoom,(e.clientY-r.top-panY)/zoom)});

// ═══════════════════ NODES ═══════════════════
function addNode(def,x,y){
  const n={id:nextNodeId++,componentId:def.id,x:Math.round(x/24)*24,y:Math.round(y/24)*24,name:def.name,icon:def.icon,color:def.color,desc:def.desc,features:[...def.features],fields:{...def.fields},userNotes:''};
  nodes.push(n);renderNode(n);updateStatus();hideEmptyState();selectNode(n.id);
}
function renderNode(n){
  const el=document.createElement('div');el.className='node';el.id=`node-${n.id}`;el.style.left=n.x+'px';el.style.top=n.y+'px';
  const fl=n.features.slice(0,3).map(f=>`• ${f}`).join('<br>');
  el.innerHTML=`<div class="node-header ${n.color}"><div class="node-icon ${n.color}">${n.icon}</div><div class="node-title">${n.name}</div><button class="node-delete" onclick="event.stopPropagation();deleteNode(${n.id})">×</button></div><div class="node-body"><div class="node-label">Features</div><div>${fl}</div></div><div class="node-ports"><div class="port input" data-node="${n.id}" data-port="input" title="Input"><span class="port-label">in</span></div><div class="port output" data-node="${n.id}" data-port="output" title="Output"><span class="port-label">out</span></div></div>`;
  el.addEventListener('mousedown',e=>{if(e.target.classList.contains('port')||e.target.classList.contains('node-delete'))return;e.stopPropagation();selectNode(n.id);startNodeDrag(n.id,e)});
  el.addEventListener('contextmenu',e=>{e.preventDefault();contextNodeId=n.id;selectNode(n.id);showContextMenu(e.clientX,e.clientY)});
  el.querySelectorAll('.port').forEach(p=>p.addEventListener('mousedown',e=>{e.stopPropagation();startConnection(+p.dataset.node,p.dataset.port,e)}));
  document.getElementById('canvasNodes').appendChild(el);
}
function updateNodeEl(n){const e=document.getElementById(`node-${n.id}`);if(e){e.style.left=n.x+'px';e.style.top=n.y+'px'}}
function deleteNode(id){nodes=nodes.filter(n=>n.id!==id);connections=connections.filter(c=>c.from!==id&&c.to!==id);const e=document.getElementById(`node-${id}`);if(e)e.remove();if(selectedNodeId===id){selectedNodeId=null;closeProps()}renderConnections();updateStatus();if(!nodes.length)showEmptyState()}
function selectNode(id){document.querySelectorAll('.node.selected').forEach(e=>e.classList.remove('selected'));selectedNodeId=id;const e=document.getElementById(`node-${id}`);if(e)e.classList.add('selected');showProps(id)}
function deselectAll(){document.querySelectorAll('.node.selected').forEach(e=>e.classList.remove('selected'));selectedNodeId=null;closeProps()}

// ═══════════════════ NODE DRAG ═══════════════════
function startNodeDrag(id,e){draggingNodeId=id;const n=nodes.find(x=>x.id===id),r=cG.getBoundingClientRect();dragOffset.x=(e.clientX-r.left-panX)/zoom-n.x;dragOffset.y=(e.clientY-r.top-panY)/zoom-n.y;document.addEventListener('mousemove',onNodeDrag);document.addEventListener('mouseup',onNodeDragEnd)}
function onNodeDrag(e){if(!draggingNodeId)return;const n=nodes.find(x=>x.id===draggingNodeId),r=cG.getBoundingClientRect();n.x=Math.round(((e.clientX-r.left-panX)/zoom-dragOffset.x)/24)*24;n.y=Math.round(((e.clientY-r.top-panY)/zoom-dragOffset.y)/24)*24;updateNodeEl(n);renderConnections()}
function onNodeDragEnd(){draggingNodeId=null;document.removeEventListener('mousemove',onNodeDrag);document.removeEventListener('mouseup',onNodeDragEnd)}

// ═══════════════════ CONNECTIONS ═══════════════════
function startConnection(nid,pt,e){connectingFrom={nodeId:nid,portType:pt};document.body.classList.add('connecting-mode');const svg=document.getElementById('canvas-svg');tempLine=document.createElementNS('http://www.w3.org/2000/svg','line');tempLine.classList.add('connection-temp');const p=getPortPos(nid,pt);tempLine.setAttribute('x1',p.x);tempLine.setAttribute('y1',p.y);tempLine.setAttribute('x2',p.x);tempLine.setAttribute('y2',p.y);svg.appendChild(tempLine);document.addEventListener('mousemove',onConnDrag);document.addEventListener('mouseup',onConnEnd)}
function onConnDrag(e){if(!tempLine)return;const r=cG.getBoundingClientRect();tempLine.setAttribute('x2',(e.clientX-r.left-panX)/zoom);tempLine.setAttribute('y2',(e.clientY-r.top-panY)/zoom)}
function onConnEnd(e){document.removeEventListener('mousemove',onConnDrag);document.removeEventListener('mouseup',onConnEnd);document.body.classList.remove('connecting-mode');if(tempLine){tempLine.remove();tempLine=null}if(!connectingFrom)return;const t=document.elementFromPoint(e.clientX,e.clientY);if(t&&t.classList.contains('port')){const tn=+t.dataset.node,tp=t.dataset.port;if(tn!==connectingFrom.nodeId&&tp!==connectingFrom.portType){const fi=connectingFrom.portType==='output'?connectingFrom.nodeId:tn,ti=connectingFrom.portType==='output'?tn:connectingFrom.nodeId;if(!connections.find(c=>c.from===fi&&c.to===ti)){connections.push({from:fi,to:ti});renderConnections()}}}connectingFrom=null}
function getPortPos(nid,pt){const el=document.getElementById(`node-${nid}`);if(!el)return{x:0,y:0};const p=el.querySelector(`.port.${pt}`);if(!p)return{x:0,y:0};const pr=p.getBoundingClientRect(),gr=cG.getBoundingClientRect();return{x:(pr.left+pr.width/2-gr.left-panX)/zoom,y:(pr.top+pr.height/2-gr.top-panY)/zoom}}
function renderConnections(){const svg=document.getElementById('canvas-svg');svg.querySelectorAll('.connection-path').forEach(e=>e.remove());for(const c of connections){const f=getPortPos(c.from,'output'),t=getPortPos(c.to,'input'),dx=Math.abs(t.x-f.x)*0.5;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M ${f.x} ${f.y} C ${f.x+dx} ${f.y}, ${t.x-dx} ${t.y}, ${t.x} ${t.y}`);p.classList.add('connection','connection-path');p.setAttribute('marker-end','url(#arrowhead)');p.dataset.from=c.from;p.dataset.to=c.to;p.style.pointerEvents='stroke';p.addEventListener('click',e=>{e.stopPropagation();if(confirm('Remove this connection?')){connections=connections.filter(x=>!(x.from===c.from&&x.to===c.to));renderConnections()}});svg.appendChild(p)}}

// ═══════════════════ PROPERTIES ═══════════════════
function showProps(nid){const n=nodes.find(x=>x.id===nid);if(!n)return;document.getElementById('propsPanel').classList.remove('hidden');document.getElementById('propsIcon').className=`props-icon ${n.color}`;document.getElementById('propsIcon').textContent=n.icon;document.getElementById('propsTitle').textContent=n.name;
let h=`<div class="prop-group"><div class="prop-group-title">General</div><div class="prop-field"><label class="prop-label">Display Name</label><input class="prop-input" value="${esc(n.name)}" onchange="updField(${n.id},'name',this.value)"></div><div class="prop-field"><label class="prop-label">Description</label><textarea class="prop-textarea" onchange="updField(${n.id},'desc',this.value)">${esc(n.desc)}</textarea></div><div class="prop-field"><label class="prop-label">Notes</label><textarea class="prop-textarea" placeholder="Add notes…" onchange="updField(${n.id},'userNotes',this.value)">${esc(n.userNotes||'')}</textarea></div></div>`;
h+=`<div class="prop-group"><div class="prop-group-title">Features</div><div class="prop-tag-list">${n.features.map(f=>`<span class="prop-tag">${esc(f)}</span>`).join('')}</div></div>`;
if(n.fields&&Object.keys(n.fields).length){h+=`<div class="prop-group"><div class="prop-group-title">Configuration</div>`;for(const[k,v]of Object.entries(n.fields))h+=`<div class="prop-field"><label class="prop-label">${k.replace(/_/g,' ')}</label><input class="prop-input" value="${esc(String(v))}" onchange="updConf(${n.id},'${k}',this.value)"></div>`;h+=`</div>`}
const ib=connections.filter(c=>c.to===n.id),ob=connections.filter(c=>c.from===n.id);
if(ib.length||ob.length){h+=`<div class="prop-group"><div class="prop-group-title">Connections</div>`;for(const c of ib){const s=nodes.find(x=>x.id===c.from);if(s)h+=`<div class="prop-tag" style="margin-bottom:4px">← ${s.icon} ${esc(s.name)}</div>`}for(const c of ob){const t=nodes.find(x=>x.id===c.to);if(t)h+=`<div class="prop-tag" style="margin-bottom:4px">→ ${t.icon} ${esc(t.name)}</div>`}h+=`</div>`}
document.getElementById('propsBody').innerHTML=h}
function closeProps(){document.getElementById('propsPanel').classList.add('hidden')}
function updField(id,f,v){const n=nodes.find(x=>x.id===id);if(n){n[f]=v;if(f==='name'){const e=document.getElementById(`node-${id}`);if(e)e.querySelector('.node-title').textContent=v}}}
function updConf(id,k,v){const n=nodes.find(x=>x.id===id);if(n)n.fields[k]=v}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ═══════════════════ PAN & ZOOM ═══════════════════
cG.addEventListener('mousedown',e=>{if(e.target===cG||e.target.id==='canvasNodes'||e.target.closest('.empty-state')){if(e.button===0&&!e.target.classList.contains('port')){deselectAll();hideContextMenu()}if(e.button===1||(e.button===0&&e.altKey)){isPanning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};cG.classList.add('panning')}}});
document.addEventListener('mousemove',e=>{if(isPanning){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;applyTransform()}});
document.addEventListener('mouseup',()=>{isPanning=false;cG.classList.remove('panning')});
cG.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1,nz=Math.min(2,Math.max(0.3,zoom*d));const r=cG.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;panX=mx-(mx-panX)*(nz/zoom);panY=my-(my-panY)*(nz/zoom);zoom=nz;applyTransform()},{passive:false});
function applyTransform(){const n=document.getElementById('canvasNodes'),s=document.getElementById('canvas-svg');n.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;n.style.transformOrigin='0 0';s.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;s.style.transformOrigin='0 0';document.getElementById('zoomLabel').textContent=Math.round(zoom*100)+'%';const sz=24*zoom;cG.style.backgroundSize=`${sz}px ${sz}px`;cG.style.backgroundPosition=`${panX}px ${panY}px`}
function zoomIn(){zoom=Math.min(2,zoom*1.2);applyTransform()}
function zoomOut(){zoom=Math.max(0.3,zoom/1.2);applyTransform()}
function zoomReset(){zoom=1;panX=0;panY=0;applyTransform()}

// ═══════════════════ CONTEXT MENU ═══════════════════
function showContextMenu(x,y){const m=document.getElementById('contextMenu');m.style.left=x+'px';m.style.top=y+'px';m.style.display='block'}
function hideContextMenu(){document.getElementById('contextMenu').style.display='none'}
document.addEventListener('click',e=>{if(!e.target.closest('.context-menu'))hideContextMenu()});
function deleteSelectedNode(){hideContextMenu();if(contextNodeId)deleteNode(contextNodeId)}
function duplicateNode(){hideContextMenu();const n=nodes.find(x=>x.id===contextNodeId);if(!n)return;const d=getComponentDef(n.componentId);if(d)addNode(d,n.x+40,n.y+40)}
function editNodeProps(){hideContextMenu();if(contextNodeId)selectNode(contextNodeId)}

// ═══════════════════ TOPOLOGICAL SORT ═══════════════════
function topoSort(){
  const adj={},ind={};nodes.forEach(n=>{adj[n.id]=[];ind[n.id]=0});
  connections.forEach(c=>{adj[c.from].push(c.to);ind[c.to]++});
  const q=nodes.filter(n=>ind[n.id]===0).map(n=>n.id),ord=[];
  while(q.length){const c=q.shift();ord.push(c);for(const nx of adj[c]){ind[nx]--;if(ind[nx]===0)q.push(nx)}}
  nodes.forEach(n=>{if(!ord.includes(n.id))ord.push(n.id)});return ord;
}

// ═══════════════════ SIMULATION ═══════════════════
function setSimSpeed(s){simSpeed=s;document.querySelectorAll('.sim-speed button').forEach(b=>b.classList.remove('active-speed'));const b=document.getElementById(`spd${String(s).replace('.','')}`);if(b)b.classList.add('active-speed')}

function toggleSimulation(){if(simRunning){stopSim();return}if(!nodes.length){alert('Add some nodes first!');return}if(!connections.length){alert('Connect nodes to simulate data flow!');return}startSim()}

function startSim(){
  simRunning=true;simStep=0;
  document.getElementById('simBtn').textContent='■ Stop';document.getElementById('simBtn').classList.add('sim-active');
  document.getElementById('simBar').classList.add('show');
  document.querySelectorAll('.node').forEach(e=>{e.classList.remove('sim-done','sim-active-node')});
  document.querySelectorAll('.connection-path').forEach(e=>{e.classList.remove('sim-done-conn','sim-active-conn')});
  const order=topoSort(),total=order.length;
  function tick(){
    if(!simRunning||simStep>=total){if(simRunning)stopSim();return}
    // Clear active highlights (keep done)
    document.querySelectorAll('.sim-active-node').forEach(e=>e.classList.remove('sim-active-node'));
    document.querySelectorAll('.sim-active-conn').forEach(e=>e.classList.remove('sim-active-conn'));
    document.querySelectorAll('.sim-particle').forEach(e=>e.remove());
    const cid=order[simStep],n=nodes.find(x=>x.id===cid);
    if(!n){simStep++;simTimer=setTimeout(tick,400/simSpeed);return}
    // Mark current active
    const nel=document.getElementById(`node-${cid}`);if(nel)nel.classList.add('sim-active-node');
    document.getElementById('simStepLabel').textContent=`Step ${simStep+1}/${total}`;
    document.getElementById('simNodeLabel').textContent=`${n.icon} ${n.name}`;
    document.getElementById('simCounter').textContent='processing…';
    // Animate outgoing connections
    const outs=connections.filter(c=>c.from===cid);
    outs.forEach(conn=>{
      const pe=document.querySelector(`path[data-from="${conn.from}"][data-to="${conn.to}"]`);
      if(pe)pe.classList.add('sim-active-conn');
      animateParticle(conn.from,conn.to);
    });
    // After delay, mark as done and advance
    simTimer=setTimeout(()=>{
      if(nel){nel.classList.remove('sim-active-node');nel.classList.add('sim-done')}
      outs.forEach(conn=>{const pe=document.querySelector(`path[data-from="${conn.from}"][data-to="${conn.to}"]`);if(pe){pe.classList.remove('sim-active-conn');pe.classList.add('sim-done-conn')}});
      simStep++;
      if(simStep<total)simTimer=setTimeout(tick,300/simSpeed);
      else{document.getElementById('simCounter').textContent='✓ complete';setTimeout(()=>{if(simRunning)stopSim()},1200)}
    },1100/simSpeed);
  }
  tick();
}

function animateParticle(fi,ti){
  const f=getPortPos(fi,'output'),t=getPortPos(ti,'input');
  const particle=document.createElement('div');particle.className='sim-particle';
  document.getElementById('canvasNodes').appendChild(particle);
  const dur=700/simSpeed,start=performance.now(),dx=Math.abs(t.x-f.x)*0.5;
  const p1x=f.x+dx,p1y=f.y,p2x=t.x-dx,p2y=t.y;
  function frame(now){
    const tm=Math.min((now-start)/dur,1),u=1-tm;
    const x=u*u*u*f.x+3*u*u*tm*p1x+3*u*tm*tm*p2x+tm*tm*tm*t.x;
    const y=u*u*u*f.y+3*u*u*tm*p1y+3*u*tm*tm*p2y+tm*tm*tm*t.y;
    particle.style.left=(x-4)+'px';particle.style.top=(y-4)+'px';
    // Trail
    if(Math.random()>0.6){const tr=document.createElement('div');tr.className='sim-particle-trail';tr.style.left=(x-2)+'px';tr.style.top=(y-2)+'px';document.getElementById('canvasNodes').appendChild(tr);setTimeout(()=>tr.remove(),400)}
    if(tm<1)requestAnimationFrame(frame);else particle.remove();
  }
  requestAnimationFrame(frame);
}

function stopSim(){
  simRunning=false;if(simTimer)clearTimeout(simTimer);simTimer=null;simStep=0;
  document.getElementById('simBtn').textContent='▶ Simulate';document.getElementById('simBtn').classList.remove('sim-active');
  document.getElementById('simBar').classList.remove('show');
  document.querySelectorAll('.sim-active-node,.sim-done').forEach(e=>{e.classList.remove('sim-active-node','sim-done')});
  document.querySelectorAll('.sim-active-conn,.sim-done-conn').forEach(e=>{e.classList.remove('sim-active-conn','sim-done-conn')});
  document.querySelectorAll('.sim-particle,.sim-particle-trail').forEach(e=>e.remove());
}

function exportJSON(){const d=JSON.stringify({nodes,connections},null,2);modalFileData={name:'agent-workflow.json',content:d};showModal('Export JSON',d)}

// ═══════════════════ EXPORT YAML ═══════════════════
function exportYML(){
  let y=`# Agent Forge Workflow Configuration\n# Generated: ${new Date().toISOString().slice(0,19)}\n\nworkflow:\n  name: agent-workflow\n  version: "1.0"\n  nodes: ${nodes.length}\n  connections: ${connections.length}\n\n`;
  const gr={};for(const n of nodes){const c=getComponentCategory(n.componentId);if(!gr[c])gr[c]=[];gr[c].push(n)}
  for(const[cat,ns]of Object.entries(gr)){
    y+=`# ── ${cat.toUpperCase()} ${'─'.repeat(30)}\n${cat}:\n`;
    for(const n of ns){
      y+=`  - id: node_${n.id}\n    component: ${n.componentId}\n    name: "${n.name}"\n    description: "${n.desc}"\n`;
      if(n.userNotes)y+=`    notes: "${n.userNotes}"\n`;
      if(n.fields&&Object.keys(n.fields).length){y+=`    config:\n`;for(const[k,v]of Object.entries(n.fields))y+=`      ${k}: "${v}"\n`}
      y+=`    features:\n`;for(const f of n.features)y+=`      - "${f}"\n`;
      const ib=connections.filter(c=>c.to===n.id),ob=connections.filter(c=>c.from===n.id);
      if(ib.length||ob.length){y+=`    connections:\n`;
        if(ib.length){y+=`      inputs:\n`;for(const c of ib){const s=nodes.find(x=>x.id===c.from);y+=`        - node_${c.from}  # ${s?s.name:'?'}\n`}}
        if(ob.length){y+=`      outputs:\n`;for(const c of ob){const t=nodes.find(x=>x.id===c.to);y+=`        - node_${c.to}  # ${t?t.name:'?'}\n`}}}
      y+='\n';
    }
  }
  y+=`# ── PIPELINE ORDER ${'─'.repeat(24)}\npipeline:\n`;
  topoSort().forEach((id,i)=>{const n=nodes.find(x=>x.id===id);if(n)y+=`  - step: ${i+1}\n    node: node_${id}\n    component: ${n.componentId}\n    name: "${n.name}"\n\n`});
  modalFileData={name:'agent-workflow.yml',content:y};showModal('Export YAML Configuration',y);
}

// ═══════════════════ EXPORT README ═══════════════════
function exportReadme(){
  const ts=new Date().toISOString().slice(0,19).replace('T',' ');
  let m=`# Agent Workflow — Documentation\n\n> Auto-generated by Agent Forge on ${ts}\n\n## Overview\n\nThis workflow contains **${nodes.length} nodes** and **${connections.length} connections** organized into a data processing pipeline.\n\n`;
  m+=`## Architecture\n\n\`\`\`\n`;
  const ord=topoSort();
  ord.forEach(id=>{const n=nodes.find(x=>x.id===id);if(!n)return;const o=connections.filter(c=>c.from===id).map(c=>{const t=nodes.find(x=>x.id===c.to);return t?t.name:'?'});m+=`  ${n.icon} ${n.name}${o.length?` → [${o.join(', ')}]`:''}\n`});
  m+=`\`\`\`\n\n`;
  m+=`## Node Schema\n\nEach node follows this schema:\n\n\`\`\`yaml\nnode:\n  id: string          # Unique node identifier\n  component: string   # Component type from palette\n  name: string        # Display name\n  description: string # What this node does\n  notes: string       # User-added notes\n  config: object      # Key-value configuration\n  features: string[]  # List of capabilities\n  connections:\n    inputs: string[]  # Nodes feeding into this one\n    outputs: string[] # Nodes this feeds into\n\`\`\`\n\n`;
  m+=`## Connection Schema\n\n\`\`\`yaml\nconnection:\n  from: string  # Source node ID (output port)\n  to: string    # Target node ID (input port)\n  type: data    # Data flow connection\n\`\`\`\n\n`;
  const gr={};for(const n of nodes){const c=getComponentCategory(n.componentId);if(!gr[c])gr[c]=[];gr[c].push(n)}
  m+=`## Nodes by Category\n\n`;
  for(const[cat,ns]of Object.entries(gr)){
    m+=`### ${cat.charAt(0).toUpperCase()+cat.slice(1)}\n\n`;
    for(const n of ns){
      m+=`#### ${n.icon} ${n.name}\n\n- **Component:** \`${n.componentId}\`\n- **Description:** ${n.desc}\n`;
      if(n.userNotes)m+=`- **Notes:** ${n.userNotes}\n`;
      m+=`\n`;
      if(n.fields&&Object.keys(n.fields).length){m+=`**Configuration:**\n\n| Key | Value |\n|-----|-------|\n`;for(const[k,v]of Object.entries(n.fields))m+=`| \`${k}\` | \`${v}\` |\n`;m+=`\n`}
      m+=`**Features:** ${n.features.join(', ')}\n\n`;
      const ib=connections.filter(c=>c.to===n.id).map(c=>nodes.find(x=>x.id===c.from)).filter(Boolean);
      const ob=connections.filter(c=>c.from===n.id).map(c=>nodes.find(x=>x.id===c.to)).filter(Boolean);
      if(ib.length)m+=`**Receives from:** ${ib.map(x=>`${x.icon} ${x.name}`).join(', ')}\n\n`;
      if(ob.length)m+=`**Sends to:** ${ob.map(x=>`${x.icon} ${x.name}`).join(', ')}\n\n`;
      m+=`---\n\n`;
    }
  }
  m+=`## Pipeline Execution Order\n\n| Step | Node | Component | Outputs To |\n|------|------|-----------|------------|\n`;
  ord.forEach((id,i)=>{const n=nodes.find(x=>x.id===id);if(!n)return;const o=connections.filter(c=>c.from===id).map(c=>{const t=nodes.find(x=>x.id===c.to);return t?t.name:'?'}).join(', ')||'—';m+=`| ${i+1} | ${n.icon} ${n.name} | \`${n.componentId}\` | ${o} |\n`});
  m+=`\n## Technology Stack\n\n| Layer | Tool | Role |\n|-------|------|------|\n| LLM | Ollama (llama3, mistral, phi3) | Local reasoning |\n| Search DB | Elasticsearch 8.x | Memory, search, dedup |\n| Orchestration | Python + APScheduler | Scheduling |\n| HTTP | httpx / requests | API calls |\n| Parsing | BeautifulSoup4 | Web scraping |\n| Email | smtplib / yagmail | Send/receive |\n| Reports | Jinja2 + WeasyPrint | HTML/PDF |\n| Config | python-dotenv | Env management |\n\n---\n\n*Generated by Agent Forge v2.0*\n`;
  modalFileData={name:'README.md',content:m};showModal('Export README & Schema',m);
}

// ═══════════════════ MODAL ═══════════════════
function showModal(t,c){document.getElementById('modalTitle').textContent=t;document.getElementById('modalContent').textContent=c;document.getElementById('exportModal').classList.add('show')}
function closeModal(){document.getElementById('exportModal').classList.remove('show')}
function copyModalContent(){navigator.clipboard.writeText(modalFileData.content).then(()=>{const b=document.getElementById('copyBtn');b.textContent='✓ Copied!';setTimeout(()=>b.textContent='📋 Copy',1500)})}
function downloadModalContent(){const b=new Blob([modalFileData.content],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=modalFileData.name;a.click()}

// ═══════════════════ IMPORT ═══════════════════
function importWorkflow(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);nodes=d.nodes||[];connections=d.connections||[];nextNodeId=Math.max(...nodes.map(n=>n.id),0)+1;document.getElementById('canvasNodes').innerHTML='';nodes.forEach(n=>renderNode(n));renderConnections();updateStatus();if(nodes.length)hideEmptyState()}catch(e){alert('Invalid workflow file')}};r.readAsText(f)};i.click()}

// ═══════════════════ MISC ═══════════════════
function clearCanvas(){if(!nodes.length||confirm('Clear all nodes and connections?')){stopSim();nodes=[];connections=[];selectedNodeId=null;document.getElementById('canvasNodes').innerHTML='';renderConnections();closeProps();showEmptyState();updateStatus()}}
function autoLayout(){
  if(!nodes.length)return;const ord=topoSort();
  const layers={},assigned=new Set();let layer=0,remaining=[...ord];
  while(remaining.length){
    const batch=remaining.filter(id=>{const inc=connections.filter(c=>c.to===id);return inc.length===0||inc.every(c=>assigned.has(c.from))});
    const pick=batch.length?batch:[remaining[0]];
    pick.forEach(id=>{layers[id]=layer;assigned.add(id)});
    remaining=remaining.filter(id=>!assigned.has(id));layer++;
  }
  const lg={};for(const[id,l]of Object.entries(layers)){if(!lg[l])lg[l]=[];lg[l].push(+id)}
  for(const[l,ids]of Object.entries(lg))ids.forEach((id,i)=>{const n=nodes.find(x=>x.id===id);if(n){n.x=80+(+l)*280;n.y=80+i*200;updateNodeEl(n)}});
  renderConnections();zoomReset();
}
function updateStatus(){document.getElementById('statusText').textContent=`${nodes.length} node${nodes.length!==1?'s':''} · ${connections.length} connection${connections.length!==1?'s':''}`}
function hideEmptyState(){document.getElementById('emptyState').style.display='none'}
function showEmptyState(){document.getElementById('emptyState').style.display='block'}
document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&selectedNodeId&&!e.target.matches('input,textarea'))deleteNode(selectedNodeId);if(e.key==='Escape'){deselectAll();hideContextMenu();closeModal()}});

renderPalette();
